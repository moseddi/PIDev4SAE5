<div class="login-container">
    <div class="login-card">
        <!-- Left side with branding -->
        <div class="login-branding">
            <div class="brand-content">
                <div class="brand-logo">WSE</div>
                <h1>Wall Street English</h1>
                <h2>Reset Password</h2>
                <div class="brand-message">
                    <p>Create your new password</p>
                </div>
            </div>
        </div>

        <!-- Right side with form -->
        <div class="login-form">
            <div class="form-content">
                <h3>New Password</h3>
                
                <!-- Success Message -->
                <div class="success-alert" *ngIf="successMessage">
                    <i class="bi bi-check-circle-fill"></i>
                    <p>{{ successMessage }}</p>
                    <p class="redirect-message">Redirecting to login...</p>
                </div>

                <!-- Reset Password Form -->
                <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
                    <!-- Error Message -->
                    <div class="error-alert" *ngIf="errorMessage">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <p>{{ errorMessage }}</p>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">New Password <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input 
                                [type]="showPassword ? 'text' : 'password'"
                                id="newPassword"
                                class="form-control" 
                                placeholder="Enter new password"
                                [(ngModel)]="newPassword"
                                name="newPassword"
                                required
                            >
                            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
                                <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                        <input 
                            type="password"
                            id="confirmPassword"
                            class="form-control" 
                            placeholder="Confirm new password"
                            [(ngModel)]="confirmPassword"
                            name="confirmPassword"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-login" [disabled]="isLoading">
                        <span *ngIf="!isLoading">
                            <i class="bi bi-check-circle"></i>
                            Reset Password
                        </span>
                        <span *ngIf="isLoading" class="spinner-border"></span>
                    </button>

                    <div class="form-links">
                        <a routerLink="/login" class="back-link">
                            <i class="bi bi-arrow-left"></i>
                            Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
