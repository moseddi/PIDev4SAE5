sonar.projectKey=wall-street-english
sonar.projectName=Wall Street English
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/dist/**
sonar.javascript.lcov.reportPaths=coverage/wall-street-english/lcov.info
sonar.sourceEncoding=UTF-8

# Exclure du calcul de coverage les fichiers sans logique testable
sonar.coverage.exclusions=\
  src/main.ts,\
  src/app/app.config.ts,\
  src/app/app.routes.ts,\
  src/app/config/**,\
  src/app/models/**,\
  src/environments/**,\
  src/app/reactivation/**,\
  src/app/unblock/**,\
  src/app/profile-completion/countries.ts,\
  **/*.html,\
  **/*.css
