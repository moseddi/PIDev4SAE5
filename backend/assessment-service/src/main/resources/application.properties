# ================= APPLICATION =================
spring.application.name=assessment-service
server.port=8088

# ================= MYSQL DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/assessment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ================= JPA CONFIGURATION =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================= EUREKA =================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ================= COMPATIBILITY =================
spring.cloud.compatibility-verifier.enabled=false

# Logging
logging.level.com.example.assessment=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Error handling
server.error.include-stacktrace=always
server.error.include-message=always

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
