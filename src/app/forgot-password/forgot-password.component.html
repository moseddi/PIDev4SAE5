<div class="login-container">
    <div class="login-card">
        <!-- Left side with branding (identique au login) -->
        <div class="login-branding">
            <div class="brand-content">
                <div class="brand-logo">WSE</div>
                <h1>Reset Password</h1>
                <h2>Wall Street English</h2>
                <div class="brand-message">
                    <p>Enter your email to receive a password reset link</p>
                </div>
            </div>
        </div>

        <!-- Right side with form -->
        <div class="login-form">
            <div class="form-content">
                <h3>Forgot Password</h3>
                
                <!-- Success Message (s'affiche après soumission) -->
                <div class="success-alert" *ngIf="successMessage">
                    <i class="bi bi-check-circle-fill"></i>
                    <p>{{ successMessage }}</p>
                    <button class="btn-back-to-login" (click)="goToLogin()">
                        <i class="bi bi-arrow-left"></i>
                        Back to Login
                    </button>
                </div>

                <!-- Forgot Password Form -->
                <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
                    <!-- Error Message -->
                    <div class="error-alert" *ngIf="errorMessage">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <p>{{ errorMessage }}</p>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            class="form-control" 
                            placeholder="Enter your email"
                            [(ngModel)]="email"
                            required
                            [class.is-invalid]="errorMessage"
                        >
                        <div class="hint-text">
                            <i class="bi bi-info-circle"></i>
                            We'll send a password reset link to this email
                        </div>
                    </div>

                    <button type="submit" class="btn-login" [disabled]="isLoading">
                        <span *ngIf="!isLoading">
                            <i class="bi bi-envelope-paper"></i>
                            Send Reset Link
                        </span>
                        <span *ngIf="isLoading" class="spinner-border"></span>
                    </button>

                    <div class="form-links">
                        <a routerLink="/login" class="back-link">
                            <i class="bi bi-arrow-left"></i>
                            Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
