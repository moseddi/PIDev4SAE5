<div class="page-container">
  <div class="page-header d-flex justify-content-between align-items-center">
    <h2><i class="bi bi-calendar-week"></i> Planning de la Classe {{classe?.nom || classeId}}</h2>
    <div>
      <button class="btn btn-outline-danger me-2" (click)="downloadPdf()" [disabled]="loading">
        <i class="bi bi-file-earmark-pdf"></i> Download PDF
      </button>
      <button class="btn btn-warning me-2" (click)="generatePlanning()" [disabled]="loading">
        <i class="bi bi-magic"></i> Auto-Planning
      </button>
      <a routerLink="/classes" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Retour
      </a>
    </div>
  </div>

  @if (error) {
  <div class="alert alert-danger">{{ error }}</div>
  }

  @if (loading) {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Chargement en cours...</p>
  </div>
  } @else {
  <div class="card shadow-sm border-0" #calendarContainer>
    <div class="card-body">
      <full-calendar [options]="calendarOptions" [events]="calendarEvents"></full-calendar>
    </div>
  </div>
  }
</div>
